<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reset Password | ShopFlow</title>
        <style>
            body {
                font-family:
                    'Inter',
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    Roboto,
                    sans-serif;
                background-color: #f4f7f9;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                color: #333;
            }
            .card {
                background: white;
                padding: 2.5rem;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
                width: 100%;
                max-width: 400px;
                animation: fadeIn 0.5s ease-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            h2 {
                margin: 0 0 1.5rem;
                color: #111827;
                text-align: center;
                font-size: 1.5rem;
                font-weight: 700;
            }
            .form-group {
                margin-bottom: 1.25rem;
            }
            label {
                display: block;
                margin-bottom: 0.5rem;
                color: #374151;
                font-size: 0.875rem;
                font-weight: 500;
            }

            .password-wrapper {
                position: relative;
                display: flex;
                align-items: center;
            }
            input {
                width: 100%;
                padding: 0.75rem;
                padding-right: 3.5rem;
                border: 1px solid #d1d5db;
                border-radius: 8px;
                box-sizing: border-box;
                font-size: 1rem;
                transition: border-color 0.2s;
            }
            input:focus {
                outline: none;
                border-color: #000;
            }

            .toggle-password {
                position: absolute;
                right: 8px;
                background: none;
                border: none;
                color: #6b7280;
                cursor: pointer;
                font-size: 0.75rem;
                font-weight: 600;
                text-transform: uppercase;
                padding: 4px 8px;
                border-radius: 4px;
                transition:
                    color 0.2s,
                    background-color 0.2s;
            }
            .toggle-password:hover {
                color: #111827;
                background-color: #f3f4f6;
            }

            button[type='submit'] {
                width: 100%;
                padding: 0.75rem;
                background-color: #000;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 1rem;
                font-weight: 600;
                margin-top: 1rem;
                transition: background-color 0.2s;
            }
            button[type='submit']:hover {
                background-color: #333;
            }
            button[type='submit']:disabled {
                background-color: #9ca3af;
                cursor: not-allowed;
            }

            .message {
                margin-top: 1.25rem;
                text-align: center;
                font-size: 0.875rem;
                padding: 0.75rem;
                border-radius: 8px;
            }
            .error {
                background-color: #fef2f2;
                color: #991b1b;
                border: 1px solid #fee2e2;
            }
            .success {
                background-color: #f0fdf4;
                color: #166534;
                border: 1px solid #dcfce7;
            }
            .hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>Reset Password</h2>
            <div id="form-container">
                <form id="reset-form" method="POST" action="javascript:void(0);">
                    <input type="hidden" id="token-input" name="token" />

                    <div class="form-group">
                        <label for="password">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required minlength="8" />
                            <button type="button" class="toggle-password" data-target="password">Show</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="8" />
                            <button type="button" class="toggle-password" data-target="confirmPassword">Show</button>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn">Reset Password</button>
                </form>
            </div>
            <div id="message" class="message hidden"></div>
        </div>

        <script src="/reset-password.js"></script>
    </body>
</html>
